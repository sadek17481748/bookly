{% extends "base.html" %}

{% block title %}Edit review • {{ book.title }} • booklet{% endblock %}

{% block content %}
  <div class="narrow">
    <h1>Edit your review</h1>
    <p class="muted">
      Book:
      <a href="{{ url_for('books.book_detail', book_id=book.id) }}">{{ book.title }}</a>
    </p>

    <form class="card" method="post" action="{{ url_for('books.edit_review_submit', book_id=book.id, review_id=review.id) }}">
      <div class="field">
        <label for="rating">Rating (1–5)</label>
        <select id="rating" name="rating" required>
          {% for i in range(5, 0, -1) %}
            <option value="{{ i }}" {% if review.rating == i %}selected{% endif %}>
              {{ i }}
            </option>
          {% endfor %}
        </select>
      </div>

      <div class="field">
        <label for="body">Your review</label>
        <textarea id="body" name="body" rows="5" required>{{ review.body }}</textarea>
      </div>

      <div class="row wrap">
        <button class="btn" type="submit">Save changes</button>
        <a class="btn btn-secondary" href="{{ url_for('books.book_detail', book_id=book.id) }}">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
