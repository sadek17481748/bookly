{% extends "base.html" %}

{% block title %}Login • bookly{% endblock %}

{% block content %}
  <div class="narrow">
    <h1>Login</h1>

    {# POST to login_submit; `next` query string preserved for redirect after login #}
    <form method="post" action="{{ url_for('auth.login_submit', next=request.args.get('next')) }}">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </div>

      <button class="btn" type="submit">Login</button>
    </form>

    <p class="muted">
      Don’t have an account?
      <a href="{{ url_for('auth.register_form') }}">Register</a>
    </p>
  </div>
{% endblock %}
